---
name: Tests
on:
  push:
    branches:
      - master
    tags:
      - "*.*"
  pull_request:
  schedule:
    - cron: 30 7 2 * *
jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
          - python-version: "3.10"
          - python-version: "3.11"
          - python-version: "3.12"
          - python-version: "3.13"
          - python-version: "3.14"
          - python-version: "3.9"
            tox-env: lint
          - python-version: "3.9"
            tox-env: doc
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install non-Python dependencies
        run: >
          sudo apt -qy update;
          sudo apt -qy install
          pkg-config
          libsmi2-dev
          libsnmp-dev
          snmp-mibs-downloader
          ncurses-term
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox tox-gh-actions wheel
      - name: Run tests with tox
        run: tox ${{ matrix.tox-env && format('-e {0}', matrix.tox-env) || '' }}
      - name: Collect coveralls data
        if: ${{ !matrix.tox-env }}
        uses: AndreMiras/coveralls-python-action@develop
        with:
          parallel: true

  coveralls_finish:
    name: Coveralls.io
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Send results to coveralls.io
        uses: AndreMiras/coveralls-python-action@develop
        with:
          parallel-finished: true
